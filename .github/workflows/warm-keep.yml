name: Railway warm-keep

on:
  schedule:
    - cron: "*/10 * * * *"   # var 10:e minut, dygnet runt
  workflow_dispatch:          # manuell trigger vid behov

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "${{ secrets.RAILWAY_APP_URL }}" || echo "000")
          echo "HTTP $STATUS"
          if [ "$STATUS" = "000" ]; then
            echo "::warning::App svarade inte — möjlig Railway cold start eller nedgång"
          fi
